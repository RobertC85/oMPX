<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>oMPX Web UI</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: Canvas;
      --card: Canvas;
      --accent: Highlight;
      --ink: CanvasText;
      --muted: GrayText;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: Canvas;
        --card: Canvas;
        --accent: Highlight;
        --ink: CanvasText;
        --muted: GrayText;
      }
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, sans-serif;
    }
    .row { margin-top: 8px; }
    .program-field { margin-right: 8px; }
    button {
      background: var(--accent);
      color: var(--ink);
      border: 1px solid var(--muted);
      border-radius: 8px;
      padding: 8px 16px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    button:hover {
      filter: brightness(0.95);
    }
    #status {
      margin-top: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div style="display: flex; flex-direction: row; gap: 24px; height: 95vh;">
    <div style="flex: 1; min-width: 0; display: flex; flex-direction: column;">
      <h2 style="margin: 12px 0 8px 0;">Modern/Tabbed UI</h2>
      <iframe src="/encoder/ompx-web-ui.html" style="flex: 1; width: 100%; border: 1px solid #2a4f47; border-radius: 8px; min-height: 600px; background: #222;"></iframe>
    </div>
    <div style="flex: 1; min-width: 0; display: flex; flex-direction: column;">
      <h2 style="margin: 12px 0 8px 0;">Classic/Complete UI</h2>
      <iframe src="/encoder/original-ui.html" style="flex: 1; width: 100%; border: 1px solid #2a4f47; border-radius: 8px; min-height: 600px; background: #222;"></iframe>
    </div>
  </div>
  <script>
    // Tab switching logic
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.onclick = function() {
        document.querySelectorAll('.tab-panel').forEach(panel => panel.style.display = 'none');
        const tab = btn.getAttribute('data-tab');
        document.getElementById('panel-' + tab).style.display = '';
      };
    });
    // Default to first tab
    document.getElementById('panel-clipping').style.display = '';

    document.getElementById('test_preview').onclick = async () => {
      setStatus('Starting preview...');
      const payload = collect();
      const r = await fetch('/api/preview_start', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      const j = await r.json();
      setStatus(j.message || 'Preview started.');
    };
    document.getElementById('stop_preview').onclick = async () => {
      setStatus('Stopping preview...');
      const r = await fetch('/api/preview_stop', {method:'POST', headers:{'Content-Type':'application/json'}, body: '{}'});
      const j = await r.json();
      setStatus(j.message || 'Preview stopped.');
    };
    document.getElementById('undo_btn').onclick = async () => {
      setStatus('Reverting to previous settings...');
      const r = await fetch('/api/undo', {method:'POST', headers:{'Content-Type':'application/json'}, body: '{}'});
      const j = await r.json();
      setStatus(j.message || 'Settings reverted.');
    };
    function collect() {
      // TODO: Collect relevant UI state for payload
      return {};
    }
    async function saveState() {
      // TODO: Save UI state if needed
    }
    function setStatus(msg) {
      document.getElementById('status').innerText = msg;
    }
    document.getElementById('apply_mpx_prog1').onclick = async () => {
      await saveState();
      const payload = collect();
      payload.program = 1;
      const r = await fetch('/api/apply_mpx', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      const j = await r.json();
      setStatus(j.message || 'Applied to MPX (Program 1).');
    };
    document.getElementById('apply_mpx_prog2').onclick = async () => {
      await saveState();
      const payload = collect();
      payload.program = 2;
      const r = await fetch('/api/apply_mpx', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      const j = await r.json();
      setStatus(j.message || 'Applied to MPX (Program 2).');
    };
  </script>
</body>
</html>
