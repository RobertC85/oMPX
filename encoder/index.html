<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oMPX Web UI</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f9f9f9;
      color: #222;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 2em auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px #0001;
      padding: 2em;
    }
    .category-title {
      font-size: 1.3em;
      font-weight: 500;
      margin-bottom: 1em;
      color: #333;
    }
    .feature-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .feature-list li {
      margin-bottom: 0.7em;
      color: #444;
    }
  </style>
</head>
<body>
  <div style="background:#ff0;color:#000;padding:8px 0;text-align:center;font-weight:bold;">VERSION TEST – 2026-04-19</div>
  <div class="container">
    <div id="top-tabs" style="display:flex;gap:1em;margin-bottom:1.5em;">
      <button class="top-tab" data-tab="program1" style="flex:1;">Program 1</button>
      <button class="top-tab" data-tab="program2" style="flex:1;">Program 2</button>
      <button class="top-tab" data-tab="global" style="flex:1;">Global Settings</button>
    </div>
      <footer style="margin:2em auto 0 auto;text-align:center;color:#888;font-size:1em;">
        oMPX Web UI – Version 0.2.1
      </footer>
    <div id="main"></div>
    <div id="global-settings" style="display:none;">
      <h3>Global Settings</h3>
      <details>
        <summary style="cursor:pointer;font-size:1em;">Custom CSS (advanced)</summary>
        <textarea id="custom-css" style="width:100%;height:80px;font-family:monospace;margin-top:0.5em;"></textarea>
        <div><button id="apply-css-btn" style="margin-top:0.5em;">Apply CSS</button></div>
        <div id="css-status" style="font-size:0.9em;color:#007700;margin-top:0.5em;"></div>
      </details>
    </div>
  </div>
  <script>
    const categories = [
      { name: 'Dynamics', features: [
        'Noise gate',
        'AGC',
        'Multiband Compressor',
        'Wideband Compressor',
        'Limiting & Clipping',
        'Enhanced Dynamics',
        'Chain Drive (dB)'
      ] },
      { name: 'Equalization', features: [
        'Bandpass',
        'Equalizer'
      ] },
      { name: 'Phase & Stereo', features: [
        'Phase',
        'Phase rotation',
        'Phase delay',
        'Stereo',
        'Stereo Boost',
        'Stereo Image',
        'Stereo Phase',
        'Stereo Delay'
      ] },
      { name: 'Other', features: [
        'Dynamics'
      ] }
    ];

    let advancedMode = false;
    let expanded = {};
    let activeTab = 'program1';
    categories.forEach(cat => { expanded[cat.name] = false; });

    function renderMain() {
      const main = document.getElementById('main');
      const globalSettings = document.getElementById('global-settings');
      // Show/hide tab content
      if (activeTab === 'global') {
        main.style.display = 'none';
        if (globalSettings) globalSettings.style.display = '';
        return;
      } else {
        main.style.display = '';
        if (globalSettings) globalSettings.style.display = 'none';
      }
      // Advanced controls for each category (scaffold)
      const advancedControls = {
        'Dynamics': `
          <label>Pre Gain <input type="number" step="0.01" id="pre_gain" value="0.25"></label><br>
          <label>Post Gain <input type="number" step="0.01" id="post_gain" value="0.99"></label><br>
          <label>Gate Threshold (dB) <input type="number" step="1" id="gate_threshold" value="-50"></label><br>
          <label>Gate Attack (s) <input type="number" step="0.01" id="gate_attack" value="0.01"></label><br>
          <label>Gate Release (s) <input type="number" step="0.01" id="gate_release" value="0.1"></label><br>
          <label>AGC Attack (s) <input type="number" step="0.001" id="agc_attack" value="0.005"></label><br>
          <label>AGC Release (s) <input type="number" step="0.01" id="agc_release" value="0.3"></label><br>
          <label>AGC Threshold (dB) <input type="number" step="1" id="agc_threshold" value="-18"></label><br>
          <label>AGC Ratio <input type="number" step="0.1" id="agc_ratio" value="2.0"></label><br>
        `,
        'Equalization': `
          <label>Bass Gain <input type="number" step="0.01" id="eq_bass" value="1.2"></label><br>
          <label>Mid Gain <input type="number" step="0.01" id="eq_mid" value="1.0"></label><br>
          <label>Treble Gain <input type="number" step="0.01" id="eq_treble" value="1.1"></label><br>
        `,
        'Phase & Stereo': `
          <label>Stereo Width <input type="number" step="0.01" id="stereo_width" value="1.0"></label><br>
        `,
        'Other': ``
      };
      // Only show controls for the selected program
      const progNum = activeTab === 'program1' ? 1 : 2;
      main.innerHTML = `
        <div style="margin-bottom:1em;">
          <label><input type="checkbox" id="advanced-toggle" ${advancedMode ? 'checked' : ''}> Advanced Mode</label>
        </div>
        <div style="margin-bottom:1.5em;display:flex;align-items:center;gap:1em;">
          <button id="listen-btn-main" data-prog="${progNum}">Listen</button>
          <audio id="audio-player-main-${progNum}" controls style="display:none;width:220px;"></audio>
          <canvas id="meter-main-${progNum}" width="120" height="20" style="display:none;margin-left:8px;vertical-align:middle;"></canvas>
          <canvas id="spectrum-main-${progNum}" width="120" height="40" style="display:none;margin-left:8px;vertical-align:middle;"></canvas>
          <canvas id="waterfall-main-${progNum}" width="120" height="60" style="display:none;margin-left:8px;vertical-align:middle;"></canvas>
        </div>
        <div>
          ${categories.map(cat => `
            <div class="category-title" style="cursor:pointer;user-select:none;display:flex;align-items:center;" data-cat="${cat.name}">
              <span style="font-size:1.2em;margin-right:0.5em;">${expanded[cat.name] ? '▼' : '►'}</span>
              ${cat.name}
            </div>
            <div class="category-content" style="margin-left:1.5em;${expanded[cat.name] ? '' : 'display:none;'}">
              <ul class="feature-list">
                ${cat.features.map(f => `<li>${f}</li>`).join('')}
              </ul>
              <div id="advanced-controls-${cat.name.replace(/\W/g,'_')}-${progNum}" style="margin:1em 0;background:#f3f3f3;padding:1em;border-radius:6px;"${advancedMode ? '' : ' hidden'}>
                <b>Advanced Controls</b><br>
                ${advancedControls[cat.name] || ''}
              </div>
              <div style="margin-top:2em;">
                <button class="test-btn" data-cat="${cat.name}" data-prog="${progNum}" style="margin-right:1em;">Test</button>
                <button class="undo-btn" data-cat="${cat.name}" data-prog="${progNum}" style="margin-right:1em;">Undo</button>
                <button class="apply-btn" data-cat="${cat.name}" data-prog="${progNum}">Apply</button>
                <span class="action-result" id="action-result-${cat.name.replace(/\W/g,'_')}-${progNum}" style="margin-left:1em;color:#007700;"></span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('advanced-toggle').onchange = (e) => {
        advancedMode = e.target.checked;
        renderMain();
      };
      document.querySelectorAll('.category-title').forEach(el => {
        el.onclick = () => {
          const cat = el.getAttribute('data-cat');
          expanded[cat] = !expanded[cat];
          renderMain();
        };
      });
      // Main Listen button logic
      const listenBtn = document.getElementById('listen-btn-main');
      const audio = document.getElementById('audio-player-main-' + progNum);
      const meter = document.getElementById('meter-main-' + progNum);
      const spectrum = document.getElementById('spectrum-main-' + progNum);
      const waterfall = document.getElementById('waterfall-main-' + progNum);
      listenBtn.onclick = () => {
        audio.src = `/api/preview.mp3?program=${progNum}&_=${Date.now()}`;
        audio.style.display = 'inline-block';
        meter.style.display = 'inline-block';
        spectrum.style.display = 'inline-block';
        waterfall.style.display = 'inline-block';
        audio.load();
        audio.play();
        if (!audio._meterSetup) {
          setupAudioVisualizers(audio, meter, spectrum, waterfall);
          audio._meterSetup = true;
        }
      };
          // Level meter, spectrum analyzer, and waterfall using Web Audio API
          function setupAudioVisualizers(audio, meterCanvas, spectrumCanvas, waterfallCanvas) {
            try {
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              const ctx = new AudioContext();
              const src = ctx.createMediaElementSource(audio);
              const analyser = ctx.createAnalyser();
              analyser.fftSize = 256;
              src.connect(analyser);
              analyser.connect(ctx.destination);
              // Level meter
              const meterCtx = meterCanvas.getContext('2d');
              // Spectrum analyzer
              const spectrumCtx = spectrumCanvas.getContext('2d');
              // Waterfall
              const waterfallCtx = waterfallCanvas.getContext('2d');
              const spectrumData = new Uint8Array(analyser.frequencyBinCount);
              const timeData = new Uint8Array(analyser.frequencyBinCount);
              function draw() {
                // Level meter
                analyser.getByteTimeDomainData(timeData);
                let peak = 0;
                for (let i = 0; i < timeData.length; i++) {
                  const v = Math.abs(timeData[i] - 128) / 128;
                  if (v > peak) peak = v;
                }
                meterCtx.clearRect(0, 0, meterCanvas.width, meterCanvas.height);
                meterCtx.fillStyle = peak > 0.8 ? '#e22' : '#2c2';
                meterCtx.fillRect(0, 0, Math.max(1, peak * meterCanvas.width), meterCanvas.height);
                meterCtx.strokeStyle = '#444';
                meterCtx.strokeRect(0, 0, meterCanvas.width, meterCanvas.height);

                // Spectrum analyzer (FFT bar graph)
                analyser.getByteFrequencyData(spectrumData);
                spectrumCtx.clearRect(0, 0, spectrumCanvas.width, spectrumCanvas.height);
                const barWidth = spectrumCanvas.width / spectrumData.length;
                for (let i = 0; i < spectrumData.length; i++) {
                  const v = spectrumData[i] / 255;
                  spectrumCtx.fillStyle = `hsl(${120 - v * 120}, 80%, 50%)`;
                  spectrumCtx.fillRect(i * barWidth, spectrumCanvas.height * (1 - v), barWidth, spectrumCanvas.height * v);
                }
                spectrumCtx.strokeStyle = '#444';
                spectrumCtx.strokeRect(0, 0, spectrumCanvas.width, spectrumCanvas.height);

                // Waterfall (scrolling spectrogram)
                // Shift image up by 1px
                const wfImg = waterfallCtx.getImageData(0, 0, waterfallCanvas.width, waterfallCanvas.height);
                waterfallCtx.putImageData(wfImg, 0, -1);
                // Draw new spectrum row at bottom
                for (let i = 0; i < spectrumData.length; i++) {
                  const v = spectrumData[i] / 255;
                  const color = `hsl(${240 - v * 240}, 100%, ${v * 60 + 20}%)`;
                  waterfallCtx.fillStyle = color;
                  waterfallCtx.fillRect(i * (waterfallCanvas.width / spectrumData.length), waterfallCanvas.height - 1, waterfallCanvas.width / spectrumData.length, 1);
                }
                requestAnimationFrame(draw);
              }
              draw();
            } catch (e) {
              meterCanvas.style.display = 'none';
              spectrumCanvas.style.display = 'none';
              waterfallCanvas.style.display = 'none';
            }
          }
      // Test button as toggle
      document.querySelectorAll('.test-btn').forEach(btn => {
        let testActive = false;
        btn.onclick = async () => {
          const cat = btn.getAttribute('data-cat');
          const prog = btn.getAttribute('data-prog');
          const resultEl = document.getElementById('action-result-' + cat.replace(/\W/g,'_') + '-' + prog);
          if (!testActive) {
            resultEl.textContent = 'Testing...';
            btn.textContent = 'Stop Test';
            const adv = advancedMode ? collectAdvanced(cat) : {};
            try {
              const res = await fetch('/api/preview_start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ program: parseInt(prog), category: cat, ...adv })
              });
              const data = await res.json();
              resultEl.textContent = data.message || (data.ok ? 'Preview started.' : 'Failed');
              testActive = true;
            } catch (e) {
              resultEl.textContent = 'Error: ' + e;
            }
          } else {
            // Stop test (no backend endpoint, just UI reset)
            resultEl.textContent = '';
            btn.textContent = 'Test';
            testActive = false;
          }
        };
      });
      // Undo button logic (per category, per program)
      if (!window._settingsHistory) window._settingsHistory = {};
      document.querySelectorAll('.undo-btn').forEach(btn => {
        btn.onclick = () => {
          const cat = btn.getAttribute('data-cat');
          const prog = btn.getAttribute('data-prog');
          const key = cat + '-' + prog;
          if (!window._settingsHistory[key] || window._settingsHistory[key].length < 2) return;
          // Remove current, revert to previous
          window._settingsHistory[key].pop();
          const prev = window._settingsHistory[key][window._settingsHistory[key].length - 1];
          // Restore values
          if (prev) {
            Object.entries(prev).forEach(([k, v]) => {
              const el = document.getElementById(k);
              if (el) el.value = v;
            });
          }
        };
      });
      // Save settings to history on Apply
      document.querySelectorAll('.apply-btn').forEach(btn => {
        btn.onclick = async () => {
          const cat = btn.getAttribute('data-cat');
          const prog = btn.getAttribute('data-prog');
          const resultEl = document.getElementById('action-result-' + cat.replace(/\W/g,'_') + '-' + prog);
          resultEl.textContent = 'Applying...';
          const adv = advancedMode ? collectAdvanced(cat) : {};
          // Save to history
          const key = cat + '-' + prog;
          if (!window._settingsHistory[key]) window._settingsHistory[key] = [];
          // Save a copy of current values
          window._settingsHistory[key].push({ ...adv });
          try {
            const res = await fetch('/api/apply_mpx', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ program: parseInt(prog), category: cat, ...adv })
            });
            const data = await res.json();
            resultEl.textContent = data.message || (data.ok ? 'Applied.' : 'Failed');
          } catch (e) {
            resultEl.textContent = 'Error: ' + e;
          }
        };
      });
      document.querySelectorAll('.apply-btn').forEach(btn => {
        btn.onclick = async () => {
          const cat = btn.getAttribute('data-cat');
          const prog = btn.getAttribute('data-prog');
          document.getElementById('action-result-' + cat.replace(/\W/g,'_') + '-' + prog).textContent = 'Applying...';
          const adv = advancedMode ? collectAdvanced(cat) : {};
          try {
            const res = await fetch('/api/apply_mpx', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ program: parseInt(prog), category: cat, ...adv })
            });
            const data = await res.json();
            document.getElementById('action-result-' + cat.replace(/\W/g,'_') + '-' + prog).textContent = data.message || (data.ok ? 'Applied.' : 'Failed');
          } catch (e) {
            document.getElementById('action-result-' + cat.replace(/\W/g,'_') + '-' + prog).textContent = 'Error: ' + e;
          }
        };
      });
      // Update audio player stream if program changes
      // No program selector now; tab controls program
    }
    function collectAdvanced(cat) {
      const vals = {};
      if (cat === 'Dynamics') {
        vals.pre_gain = parseFloat(document.getElementById('pre_gain').value);
        vals.post_gain = parseFloat(document.getElementById('post_gain').value);
        vals.gate_threshold = parseFloat(document.getElementById('gate_threshold').value);
        vals.gate_attack = parseFloat(document.getElementById('gate_attack').value);
        vals.gate_release = parseFloat(document.getElementById('gate_release').value);
        vals.agc_attack = parseFloat(document.getElementById('agc_attack').value);
        vals.agc_release = parseFloat(document.getElementById('agc_release').value);
        vals.agc_threshold = parseFloat(document.getElementById('agc_threshold').value);
        vals.agc_ratio = parseFloat(document.getElementById('agc_ratio').value);
      } else if (cat === 'Equalization') {
        vals.eq_bass = parseFloat(document.getElementById('eq_bass').value);
        vals.eq_mid = parseFloat(document.getElementById('eq_mid').value);
        vals.eq_treble = parseFloat(document.getElementById('eq_treble').value);
      } else if (cat === 'Phase & Stereo') {
        vals.stereo_width = parseFloat(document.getElementById('stereo_width').value);
      }
      return vals;
    }
    renderMain();
    // Top tab switching
    document.querySelectorAll('.top-tab').forEach(btn => {
      btn.onclick = () => {
        activeTab = btn.getAttribute('data-tab');
        renderMain();
        // Reselect tab visually
        document.querySelectorAll('.top-tab').forEach(b => b.style.background = '');
        btn.style.background = '#e0e0e0';
      };
    });
    // Set initial tab highlight
    document.querySelector('.top-tab[data-tab="program1"]').style.background = '#e0e0e0';

    // Custom CSS support (now under global settings)
    const cssKey = 'ompx_custom_css';
    const cssArea = document.getElementById('custom-css');
    const cssBtn = document.getElementById('apply-css-btn');
    const cssStatus = document.getElementById('css-status');
    if (cssArea && window.localStorage) {
      cssArea.value = localStorage.getItem(cssKey) || '';
      applyCustomCSS(cssArea.value);
      cssBtn.onclick = () => {
        const val = cssArea.value;
        localStorage.setItem(cssKey, val);
        applyCustomCSS(val);
        cssStatus.textContent = 'Custom CSS applied.';
        setTimeout(() => { cssStatus.textContent = ''; }, 2000);
      };
    }
    function applyCustomCSS(css) {
      let styleTag = document.getElementById('custom-css-style');
      if (!styleTag) {
        styleTag = document.createElement('style');
        styleTag.id = 'custom-css-style';
        document.head.appendChild(styleTag);
      }
      styleTag.textContent = css;
    }
  </script>
</body>
</html>
