<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oMPX Web UI</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f9f9f9;
      color: #222;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 2em auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px #0001;
      padding: 2em;
    }
    .category-title {
      font-size: 1.3em;
      font-weight: 500;
      margin-bottom: 1em;
      color: #333;
    }
    .feature-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .feature-list li {
      margin-bottom: 0.7em;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="main"></div>
  </div>
  <script>
    const categories = [
      { name: 'Dynamics', features: [
        'Noise gate',
        'AGC',
        'Multiband Compressor',
        'Wideband Compressor',
        'Limiting & Clipping',
        'Enhanced Dynamics',
        'Chain Drive (dB)'
      ] },
      { name: 'Equalization', features: [
        'Bandpass',
        'Equalizer'
      ] },
      { name: 'Phase & Stereo', features: [
        'Phase',
        'Phase rotation',
        'Phase delay',
        'Stereo',
        'Stereo Boost',
        'Stereo Image',
        'Stereo Phase',
        'Stereo Delay'
      ] },
      { name: 'Other', features: [
        'Dynamics'
      ] }
    ];

    let advancedMode = false;
    let expanded = {};
    categories.forEach(cat => { expanded[cat.name] = false; });

    function renderMain() {
      const main = document.getElementById('main');
      // Advanced controls for each category (scaffold)
      const advancedControls = {
        'Dynamics': `
          <label>Pre Gain <input type="number" step="0.01" id="pre_gain" value="0.25"></label><br>
          <label>Post Gain <input type="number" step="0.01" id="post_gain" value="0.99"></label><br>
          <label>Gate Threshold (dB) <input type="number" step="1" id="gate_threshold" value="-50"></label><br>
          <label>Gate Attack (s) <input type="number" step="0.01" id="gate_attack" value="0.01"></label><br>
          <label>Gate Release (s) <input type="number" step="0.01" id="gate_release" value="0.1"></label><br>
          <label>AGC Attack (s) <input type="number" step="0.001" id="agc_attack" value="0.005"></label><br>
          <label>AGC Release (s) <input type="number" step="0.01" id="agc_release" value="0.3"></label><br>
          <label>AGC Threshold (dB) <input type="number" step="1" id="agc_threshold" value="-18"></label><br>
          <label>AGC Ratio <input type="number" step="0.1" id="agc_ratio" value="2.0"></label><br>
        `,
        'Equalization': `
          <label>Bass Gain <input type="number" step="0.01" id="eq_bass" value="1.2"></label><br>
          <label>Mid Gain <input type="number" step="0.01" id="eq_mid" value="1.0"></label><br>
          <label>Treble Gain <input type="number" step="0.01" id="eq_treble" value="1.1"></label><br>
        `,
        'Phase & Stereo': `
          <label>Stereo Width <input type="number" step="0.01" id="stereo_width" value="1.0"></label><br>
        `,
        'Other': ``
      };
      main.innerHTML = `
        <div style="margin-bottom:1em;">
          <label><input type="checkbox" id="advanced-toggle" ${advancedMode ? 'checked' : ''}> Advanced Mode</label>
        </div>
        <div>
          ${categories.map(cat => `
            <div class="category-title" style="cursor:pointer;user-select:none;display:flex;align-items:center;" data-cat="${cat.name}">
              <span style="font-size:1.2em;margin-right:0.5em;">${expanded[cat.name] ? '▼' : '►'}</span>
              ${cat.name}
            </div>
            <div class="category-content" style="margin-left:1.5em;${expanded[cat.name] ? '' : 'display:none;'}">
              <div style="margin-bottom:1em;display:flex;align-items:center;gap:1em;">
                <div>
                  <label for="program-select-${cat.name.replace(/\W/g,'_')}"><b>Program:</b></label>
                  <select id="program-select-${cat.name.replace(/\W/g,'_')}">
                    <option value="1">Program 1</option>
                    <option value="2">Program 2</option>
                  </select>
                </div>
                <button class="listen-btn" data-cat="${cat.name}">Listen</button>
                <audio id="audio-player-${cat.name.replace(/\W/g,'_')}" controls style="display:none;width:200px;"></audio>
              </div>
              <ul class="feature-list">
                ${cat.features.map(f => `<li>${f}</li>`).join('')}
              </ul>
              <div id="advanced-controls-${cat.name.replace(/\W/g,'_')}" style="margin:1em 0;background:#f3f3f3;padding:1em;border-radius:6px;"${advancedMode ? '' : ' hidden'}>
                <b>Advanced Controls</b><br>
                ${advancedControls[cat.name] || ''}
              </div>
              <div style="margin-top:2em;">
                <button class="test-btn" data-cat="${cat.name}" style="margin-right:1em;">Test</button>
                <button class="apply-btn" data-cat="${cat.name}">Apply</button>
                <span class="action-result" id="action-result-${cat.name.replace(/\W/g,'_')}" style="margin-left:1em;color:#007700;"></span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('advanced-toggle').onchange = (e) => {
        advancedMode = e.target.checked;
        renderMain();
      };
      document.querySelectorAll('.category-title').forEach(el => {
        el.onclick = () => {
          const cat = el.getAttribute('data-cat');
          expanded[cat] = !expanded[cat];
          renderMain();
        };
      });
      document.querySelectorAll('.listen-btn').forEach(btn => {
        btn.onclick = () => {
          const cat = btn.getAttribute('data-cat');
          const program = parseInt(document.getElementById('program-select-' + cat.replace(/\W/g,'_')).value);
          const audio = document.getElementById('audio-player-' + cat.replace(/\W/g,'_'));
          audio.src = `/api/preview.mp3?program=${program}&_=${Date.now()}`;
          audio.style.display = 'inline-block';
          audio.load();
          audio.play();
        };
      });
      document.querySelectorAll('.test-btn').forEach(btn => {
        btn.onclick = async () => {
          const cat = btn.getAttribute('data-cat');
          const program = parseInt(document.getElementById('program-select-' + cat.replace(/\W/g,'_')).value);
          document.getElementById('action-result-' + cat.replace(/\W/g,'_')).textContent = 'Testing...';
          const adv = advancedMode ? collectAdvanced(cat) : {};
          try {
            const res = await fetch('/api/preview_start', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ program, category: cat, ...adv })
            });
            const data = await res.json();
            document.getElementById('action-result-' + cat.replace(/\W/g,'_')).textContent = data.message || (data.ok ? 'Preview started.' : 'Failed');
          } catch (e) {
            document.getElementById('action-result-' + cat.replace(/\W/g,'_')).textContent = 'Error: ' + e;
          }
        };
      });
      document.querySelectorAll('.apply-btn').forEach(btn => {
        btn.onclick = async () => {
          const cat = btn.getAttribute('data-cat');
          const program = parseInt(document.getElementById('program-select-' + cat.replace(/\W/g,'_')).value);
          document.getElementById('action-result-' + cat.replace(/\W/g,'_')).textContent = 'Applying...';
          const adv = advancedMode ? collectAdvanced(cat) : {};
          try {
            const res = await fetch('/api/apply_mpx', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ program, category: cat, ...adv })
            });
            const data = await res.json();
            document.getElementById('action-result-' + cat.replace(/\W/g,'_')).textContent = data.message || (data.ok ? 'Applied.' : 'Failed');
          } catch (e) {
            document.getElementById('action-result-' + cat.replace(/\W/g,'_')).textContent = 'Error: ' + e;
          }
        };
      });
      // Update audio player stream if program changes
      document.querySelectorAll('select[id^="program-select-"]').forEach(sel => {
        sel.onchange = () => {
          const cat = sel.id.replace('program-select-','').replace(/_/g,' ');
          const audio = document.getElementById('audio-player-' + sel.id.replace('program-select-',''));
          if(audio && audio.style.display !== 'none') {
            const program = parseInt(sel.value);
            audio.src = `/api/preview.mp3?program=${program}&_=${Date.now()}`;
            audio.load();
            audio.play();
          }
        };
      });
    }
    function collectAdvanced(cat) {
      const vals = {};
      if (cat === 'Dynamics') {
        vals.pre_gain = parseFloat(document.getElementById('pre_gain').value);
        vals.post_gain = parseFloat(document.getElementById('post_gain').value);
        vals.gate_threshold = parseFloat(document.getElementById('gate_threshold').value);
        vals.gate_attack = parseFloat(document.getElementById('gate_attack').value);
        vals.gate_release = parseFloat(document.getElementById('gate_release').value);
        vals.agc_attack = parseFloat(document.getElementById('agc_attack').value);
        vals.agc_release = parseFloat(document.getElementById('agc_release').value);
        vals.agc_threshold = parseFloat(document.getElementById('agc_threshold').value);
        vals.agc_ratio = parseFloat(document.getElementById('agc_ratio').value);
      } else if (cat === 'Equalization') {
        vals.eq_bass = parseFloat(document.getElementById('eq_bass').value);
        vals.eq_mid = parseFloat(document.getElementById('eq_mid').value);
        vals.eq_treble = parseFloat(document.getElementById('eq_treble').value);
      } else if (cat === 'Phase & Stereo') {
        vals.stereo_width = parseFloat(document.getElementById('stereo_width').value);
      }
      return vals;
    }
    renderMain();
  </script>
</body>
</html>
