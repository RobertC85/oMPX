<!-- Program 2 UI -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oMPX Program 2</title>
  <script>
    var s = document.createElement('script');
    s.src = 'main.js?v=' + Date.now();
    s.defer = true;
    document.head.appendChild(s);
  </script>
  <style>
    :root {
      --bg: #0f1b1a;
      --card: #132825;
      --accent: #f2b642;
      --accent-dark: #d99424;
      --ink: #f4f7f5;
      --muted: #9fb8b0;
    }
    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: radial-gradient(circle at 10% 10%, #1c3b35, var(--bg));
      color: var(--ink);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 2em auto;
      background: linear-gradient(180deg, #1a322e, var(--card));
      border-radius: 12px;
      box-shadow: 0 2px 16px #0003;
      padding: 2em;
      border: 1px solid #2a4f47;
    }
    .sidebar-btn {
      background: #111;
      color: var(--accent);
      border: 1px solid var(--accent);
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      padding: 8px 16px;
      margin-bottom: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .sidebar-btn.active {
      background: var(--accent);
      color: #1b1406;
    }
    .sidebar-btn.unavailable {
      background: #111;
      color: #888;
      border: 1px solid #222;
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div style="background:#ff0;color:#000;padding:8px 0;text-align:center;font-weight:bold;">oMPX Version <span class="ompx-version">...</span></div>
  <div style="display:flex;min-height:90vh;">
    <nav id="sidebar" style="width:220px;background:linear-gradient(180deg,#1a322e,#132825);border-right:1px solid #2a4f47;padding:2em 1em 2em 1.5em;display:flex;flex-direction:column;gap:1em;">
      <button class="sidebar-btn" onclick="location.href='program1.html'">Program 1</button>
      <button class="sidebar-btn active" onclick="location.href='program2.html'">Program 2</button>
      <button class="sidebar-btn unavailable">Global Settings</button>
      <button class="sidebar-btn unavailable">About</button>
    </nav>
    <div class="container" style="flex:1;">
      <div class="category-title">Program 2 Controls</div>
      <div class="feature-list">
        <li>
          <label>Input Channel</label><br>
          <select id="input_device_prg2">
            <option value="radio2_url">Program 2 stream URL</option>
            <option value="ompx_prg2in_cap">Program 2 input</option>
            <option value="ompx_prg2mpx_cap">Program 2 MPX path</option>
          </select>
        </li>
        <li>
          <label>Sample Rate</label><br>
          <input id="sample_rate_prg2" type="number" min="8000" max="192000" step="1000" />
        </li>
        <li>
          <label>Waveform Window (seconds)</label><br>
          <input id="wave_window_sec_prg2" type="range" min="0.25" max="10" step="0.25" />
          <span id="wave_window_readout_prg2">3.00 s</span>
        </li>
        <li>
          <button id="analysis_pause_prg2" type="button">Pause Scope</button>
          <button id="analysis_step_prg2" type="button" class="btn-inactive">Step Frame</button>
        </li>
        <li>
          <label>HF Tame (dB)</label><br>
          <input id="hf_tame_db_prg2" type="number" step="0.1" />
        </li>
        <li>
          <label>HF Tame Freq (Hz)</label><br>
          <input id="hf_tame_freq_prg2" type="number" step="100" />
        </li>
        <li>
          <label>Bypass All Processing</label><br>
          <input id="processing_bypass_prg2" type="checkbox" />
          <button id="processing_bypass_toggle_prg2" type="button">Toggle Processing Bypass</button>
        </li>
        <li>
          <label>Auto Level Match In Bypass</label><br>
          <input id="bypass_level_match_enabled_prg2" type="checkbox" />
          <label>Bypass Level Trim (dB)</label>
          <input id="bypass_level_match_db_prg2" type="number" step="0.1" min="-24" max="24" />
        </li>
        <li>
          <button id="apply_prg2">Apply and Refresh Preview</button>
          <button id="apply_prg2" class="btn-inactive">Apply and Refresh Preview</button>
        </li>
        <li>
          <button id="patch_start_prg2">Start Hardware Patch</button>
          <button id="patch_stop_prg2" type="button" class="btn-inactive">Stop Hardware Patch</button>
        </li>
        <li>
          <label>Hardware Patch Output Device</label><br>
          <input id="patch_output_device_prg2" type="text" />
        </li>
        <li>
          <audio id="audio_prg2" controls autoplay style="width:100%; margin-top:10px"></audio>
        </li>
        <li>
          <label>Waveform</label><br>
          <canvas id="wave_prg2" width="900" height="180"></canvas>
        </li>
        <li>
          <label>Band Spectrum</label><br>
          <canvas id="spec_prg2" width="900" height="180"></canvas>
        </li>
        <li>
          <label>Processor Band Meters</label>
          <div class="meter-grid" id="band_meters_prg2">
            <div class="meter-row"><span class="name">Sub (30-120)</span><div class="meter-track"><div id="meter_sub_prg2" class="meter-fill"></div></div><span id="meter_sub_db_prg2" class="db">-inf dB</span></div>
            <div class="meter-row"><span class="name">Low (120-400)</span><div class="meter-track"><div id="meter_low_prg2" class="meter-fill"></div></div><span id="meter_low_db_prg2" class="db">-inf dB</span></div>
            <div class="meter-row"><span class="name">Mid (400-2k)</span><div class="meter-track"><div id="meter_mid_prg2" class="meter-fill"></div></div><span id="meter_mid_db_prg2" class="db">-inf dB</span></div>
            <div class="meter-row"><span class="name">Presence (2k-6k)</span><div class="meter-track"><div id="meter_pres_prg2" class="meter-fill"></div></div><span id="meter_pres_db_prg2" class="db">-inf dB</span></div>
            <div class="meter-row"><span class="name">Air (6k-15k)</span><div class="meter-track"><div id="meter_air_prg2" class="meter-fill"></div></div><span id="meter_air_db_prg2" class="db">-inf dB</span></div>
          </div>
        </li>
        <li>
          <label>MPX FFT Snapshot (server-side)</label><br>
          <img id="fft_img_prg2" alt="MPX FFT" style="display:block; width:100%; height:180px; object-fit:fill;" />
        </li>
      </div>
    </div>
  </div>
</body>
</html>
