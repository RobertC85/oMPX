<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>oMPX Profile Editor</title>
  <style>
    body { background: #1c3b35; color: #f4f7f5; font-family: sans-serif; margin: 0; padding: 0; }
    .wrap { max-width: 700px; margin: 40px auto; background: #132825; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px #0008; }
    h1 { margin-top: 0; }
    select, input, textarea, button { font-size: 1em; margin: 6px 0; }
    label { display: block; margin-top: 10px; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    .param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .param-row label { flex: 1; margin: 0; }
    .param-row input, .param-row textarea { flex: 2; }
    .param-row textarea { min-height: 2em; }
    .status { color: #9fb8b0; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>oMPX Profile Editor</h1>
    <label>Profile:
      <select id="profileSelect"></select>
      <button id="loadProfile">Load</button>
      <input type="file" id="uploadProfile" style="display:none" />
      <!doctype html>
      <html>
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>oMPX Live Control</title>
        <style>
        :root { --bg:#0f1b1a; --card:#132825; --accent:#f2b642; --ink:#f4f7f5; --muted:#9fb8b0; }
        body { margin:0; font-family: ui-sans-serif, sans-serif; background: radial-gradient(circle at 10% 10%, #1c3b35, var(--bg)); color:var(--ink); }
        .wrap { max-width:1080px; margin:0 auto; padding:24px; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .card { background:linear-gradient(180deg, #1a322e, var(--card)); border:1px solid #2a4f47; border-radius:12px; padding:14px; }
        h1 { margin:0 0 12px; font-size:28px; letter-spacing:0.03em; }
        label { display:block; font-size:13px; color:var(--muted); margin-top:8px; }
        input, select, button { width:100%; margin-top:4px; padding:8px; border-radius:8px; border:1px solid #365f55; background:#0d1f1c; color:var(--ink); }
        button { cursor:pointer; background:linear-gradient(180deg, #f2b642, #d99424); color:#1b1406; font-weight:600; }
        .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        canvas { width:100%; height:140px; background:#0a1412; border:1px solid #2a4f47; border-radius:8px; }
        .status { font-size:12px; color:var(--muted); margin-top:10px; }
        .meter-grid { display:grid; grid-template-columns:1fr; gap:8px; margin-top:8px; }
        .meter-row { display:grid; grid-template-columns:86px 1fr 62px; gap:8px; align-items:center; }
        .meter-row .name { font-size:12px; color:var(--muted); }
        .meter-row .db { font-size:12px; color:var(--ink); text-align:right; }
        .meter-track { height:10px; border-radius:999px; border:1px solid #2a4f47; background:#0a1412; overflow:hidden; }
        .meter-fill { height:100%; width:0%; background:linear-gradient(90deg, #2fd38a, #f2b642); transition:width 120ms linear; }
        .tabs { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
        .tab-btn { width:auto; padding:8px 12px; border-radius:999px; border:1px solid #365f55; background:#0d1f1c; color:var(--ink); }
        .tab-btn.active { background:linear-gradient(180deg, #f2b642, #d99424); color:#1b1406; border-color:#d99424; }
        .tab-name { max-width:180px; }
        .program-field { display:none; }
        .global-field { display:none; }
        .program-field.active { display:block; }
        .global-field.active { display:block; }
        .stereo-adv { display:none; }
        .stereo-adv.active { display:block; }
        @media (max-width:900px) { .grid { grid-template-columns:1fr; } }
        </style>
        <style id="ui_custom_css_tag"></style>
      </head>
      <body>
        ...[HTML content omitted for brevity, see user message for full content]...
      </body>
      </html>
        renderTabs();
      }
    }
    document.getElementById('profileSelect').onchange = e => {
      loadProfile(e.target.value);
    };
    document.getElementById('loadProfile').onclick = () => {
      const sel = document.getElementById('profileSelect');
      loadProfile(sel.value);
    };
    document.getElementById('saveBtn').onclick = async () => {
      const lines = Object.entries(currentParams).map(([k,v]) => `${k}=${JSON.stringify(v)}`);
      const text = lines.join('\n');
      await fetch('/api/profile', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name: currentProfile, text})});
      document.getElementById('status').textContent = 'Profile saved.';
      setTimeout(()=>{document.getElementById('status').textContent='';}, 2000);
    };
    document.getElementById('applyBtn').onclick = async () => {
      const lines = Object.entries(currentParams).map(([k,v]) => `${k}=${JSON.stringify(v)}`);
      const text = lines.join('\n');
      await fetch('/api/profile/apply', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name: currentProfile, text})});
      document.getElementById('status').textContent = 'Profile applied.';
      setTimeout(()=>{document.getElementById('status').textContent='';}, 2000);
    };
    document.getElementById('uploadBtn').onclick = () => {
      document.getElementById('uploadProfile').click();
    };
    document.getElementById('uploadProfile').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      const name = prompt('Enter a name for this profile (.env will be added):');
      if (!name) return;
      await fetch('/api/profile', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name: name.endsWith('.env') ? name : name+'.env', text})});
      await fetchProfiles();
      loadProfile(name.endsWith('.env') ? name : name+'.env');
    };
    // Advanced toggle event
    document.getElementById('advanced-toggle').onchange = renderParamsForm;
    // Initial load
    fetchProfiles().then(() => {
      const sel = document.getElementById('profileSelect');
      if (sel.options.length) loadProfile(sel.value);
    });
  </script>
</body>
</html>
